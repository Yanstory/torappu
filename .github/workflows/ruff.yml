name: Ruff Lint

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "torappu/**"

jobs:
  ruff:
    name: Ruff Lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    concurrency:
      group: ruff-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6

      - name: Run Ruff Lint
        uses: astral-sh/ruff-action@v3
